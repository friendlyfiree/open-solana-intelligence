name: OSI V2 Foundation

# Validation gate for the OSI V2 foundation (additive schema, default-deny RLS,
# Stage-5 nonce/replay/receipt infrastructure). It runs entirely against a
# disposable local Supabase database. It never touches a production project:
# there are no secrets, no `supabase link`, and no linked-project commands.
# OSI_V2_WRITES_ENABLED and OSI_V2_PROOF_ENABLED remain false in committed config.

on:
  pull_request:
  workflow_dispatch:

# Least privilege: this gate only needs to read the checked-out code.
permissions:
  contents: read

# Cancel superseded runs for the same ref so only the latest commit is validated.
concurrency:
  group: osi-v2-foundation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundation:
    name: Stage-5 foundation validation
    runs-on: ubuntu-latest
    env:
      # Standard Supabase local database endpoint (see supabase/config.toml db.port).
      OSI_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - name: Check out the pull request
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Set up Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.4.1

      - name: Install pinned Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: 2.109.1

      - name: Show tool versions
        run: |
          node --version
          supabase --version
          psql --version

      - name: Dependency-free unit tests
        run: |
          node tests/osi-v2-migrations.test.js
          node tests/osi-v2-proof-core.test.mjs
          node tests/xss-escaping.test.js
          node tests/osi-v2-case-read.test.mjs
          node tests/osi-v2-case-write.test.mjs
          node tests/osi-v2-case-ui.test.js
          node tests/osi-session-access.test.js
          node tests/osi-v2-read-session.test.mjs
          node tests/osi-provider-call-count.test.mjs
          node tests/osi-wire-integrity.test.mjs
          node tests/osi-v2-wire.test.mjs
          node tests/osi-v2-wire-ui.test.mjs
          node tests/osi-v2-ai-pack.test.mjs
          node tests/osi-v2-ai-pack-ui.test.mjs
          node tests/osi-proof-public-truth.test.js
          node tests/osi-functional-surface.test.mjs
          node tests/osi-intelligence-interface.test.js
          node tests/osi-motion-visual.test.mjs
          node tests/osi-v2-analyst-core.test.mjs
          node tests/osi-v2-analyst-ui.test.js
          node tests/osi-v2-report.test.mjs
          node tests/osi-v2-governance.test.mjs
          node tests/osi-v2-payment.test.mjs
          node tests/osi-v2-sas-core.test.mjs
          deno check supabase/functions/_shared/osi-v2-sas-core.mjs
          deno check supabase/functions/_shared/osi-v2-sas-onchain.ts
          deno check supabase/functions/_shared/osi-v2-sas-sdk.ts
          deno check supabase/functions/_shared/osi-v2-sas-issuer.ts
          deno check supabase/functions/osi-v2-case-read/index.ts
          deno check supabase/functions/osi-v2-case-write/index.ts
          deno check supabase/functions/osi-v2-analyst/index.ts
          deno check supabase/functions/osi-v2-report-read/index.ts
          deno check supabase/functions/osi-v2-report-write/index.ts
          deno check supabase/functions/osi-v2-governance-write/index.ts
          deno check supabase/functions/osi-v2-payment/index.ts
          deno check supabase/functions/osi-v2-proof/index.ts
          deno check supabase/functions/osi-v2-wire/index.ts
          deno check supabase/functions/osi-v2-ai-pack/index.ts
          deno check supabase/functions/_shared/osi-v2-read-session-core.mjs
          deno check supabase/functions/_shared/osi-v2-wire-core.mjs

      - name: Chromium UI contracts
        run: |
          npm install --no-save --no-package-lock @playwright/test@1.55.0 http-server@14.1.1
          npx playwright install --with-deps chromium
          npx playwright test --config tests/browser/playwright.config.js

      - name: Start disposable local database (PostgreSQL 17)
        run: supabase db start

      - name: Apply migrations from zero (no seed)
        run: supabase db reset --local --no-seed

      - name: Database lint (errors only)
        # The accepted legacy materialization functions create pg_temp tables
        # at runtime, which the static linter reports as absent. Keep those
        # results visible while matching the reviewed main-branch lint gate.
        run: supabase db lint --local --level error

      - name: pgTAP database tests
        run: supabase test db

      - name: Two-connection nonce concurrency and replay integration test
        run: bash tests/osi-v2-concurrency.test.sh

      - name: Always stop and discard the disposable database
        if: always()
        run: supabase stop --no-backup
