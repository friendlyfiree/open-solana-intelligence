name: OSI V2 Wire Phase 2 Production

# Manual, current-main-only rollout for the governed Wire lane. The additive
# ordered Wire migrations land fail closed. This workflow deploys only the three
# touched functions and enables only the dedicated Wire flag after all privacy,
# regression, proof, and preservation checks.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type WIRE-PHASE2-DEPLOY-afibxpniwfnavdobecrn to authorize"
        required: true
        default: ""

permissions:
  contents: read

concurrency:
  group: osi-v2-wire-phase2-production
  cancel-in-progress: false

env:
  EXPECTED_PROJECT_REF: afibxpniwfnavdobecrn
  PRODUCTION_WEB_URL: https://open-solana-intel.vercel.app
  PHASE1_VERSION: "20260718120000"
  PHASE2_VERSION: "20260718130000"
  BASE_VERSIONS: >-
    20260711092711 20260711092852 20260711092856 20260711182949 20260712002518 20260712121301 20260713045903 20260713184533 20260714044036 20260714064501 20260714082218 20260715053828 20260715112621 20260716063000 20260716120000
  PHASE1_VERSIONS: >-
    20260711092711 20260711092852 20260711092856 20260711182949 20260712002518 20260712121301 20260713045903 20260713184533 20260714044036 20260714064501 20260714082218 20260715053828 20260715112621 20260716063000 20260716120000 20260718120000
  AFTER_VERSIONS: >-
    20260711092711 20260711092852 20260711092856 20260711182949 20260712002518 20260712121301 20260713045903 20260713184533 20260714044036 20260714064501 20260714082218 20260715053828 20260715112621 20260716063000 20260716120000 20260718120000 20260718130000
  OSI_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

jobs:
  validate:
    name: Clean local Wire Phase 2 gate
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Require exact confirmation and current main
        run: |
          set -euo pipefail
          [ "${{ github.event.inputs.confirm }}" = "WIRE-PHASE2-DEPLOY-${EXPECTED_PROJECT_REF}" ] || {
            echo "::error::Confirmation phrase mismatch."; exit 1;
          }
          [ "${GITHUB_REF}" = "refs/heads/main" ] || {
            echo "::error::Production rollout must be dispatched from main."; exit 1;
          }

      - name: Check out exact dispatched commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Verify exact current main commit
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ] || {
            echo "::error::Dispatched commit is not current origin/main."; exit 1;
          }

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.4.1
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: 2.109.1

      - name: Verify exact seventeen-migration repository
        run: |
          set -euo pipefail
          got="$(find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort | sed -E 's/^([0-9]{14}).*/\1/' | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
          expected="$(echo "$AFTER_VERSIONS" | tr -s '[:space:]' ' ' | sed 's/^ //; s/ $//')"
          [ "$got" = "$expected" ] || {
            echo "::error::Repository migration set is not the exact expected seventeen versions."; exit 1;
          }
          test -f "supabase/migrations/${PHASE1_VERSION}_osi_v2_wire_phase1.sql"
          test -f "supabase/migrations/${PHASE2_VERSION}_osi_v2_wire_phase2.sql"

      - name: Full Node and touched-function battery
        run: |
          set -euo pipefail
          for test in tests/*.test.js tests/*.test.mjs; do node "$test"; done
          deno check supabase/functions/_shared/osi-v2-read-session-core.mjs
          deno check supabase/functions/_shared/osi-v2-wire-core.mjs
          deno check supabase/functions/_shared/osi-v2-governance-core.mjs
          deno check supabase/functions/_shared/osi-v2-payment-core.mjs
          deno check supabase/functions/osi-v2-case-read/index.ts
          deno check supabase/functions/osi-v2-wire/index.ts
          deno check supabase/functions/osi-v2-payment/index.ts

      - name: Chromium UI contracts
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock @playwright/test@1.55.0 http-server@14.1.1
          npx playwright install --with-deps chromium
          npx playwright test --config tests/browser/playwright.config.js

      - name: Fresh PostgreSQL 17 migration lint pgTAP and races
        run: |
          set -euo pipefail
          supabase db start
          supabase db reset --local --no-seed
          got="$(psql "$OSI_TEST_DATABASE_URL" -Atqc "select coalesce(string_agg(version, ' ' order by version), '') from supabase_migrations.schema_migrations")"
          expected="$(echo "$AFTER_VERSIONS" | tr -s '[:space:]' ' ' | sed 's/^ //; s/ $//')"
          [ "$got" = "$expected" ] || { echo "::error::Fresh local migration history is not exact."; exit 1; }
          supabase db lint --local --level error
          supabase test db
          bash tests/osi-v2-concurrency.test.sh

      - name: Stop and discard disposable local database
        if: always()
        run: supabase stop --no-backup

  deploy:
    name: Exact Wire migration functions smoke enable and verify
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID_SECRET: ${{ secrets.SUPABASE_PROJECT_ID }}
      PGSSLMODE: require
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: 2.109.1

      - name: Verify credentials project and unchanged main
        run: |
          set -euo pipefail
          [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] || { echo "::error::SUPABASE_ACCESS_TOKEN is absent."; exit 1; }
          [ -n "${SUPABASE_DB_PASSWORD:-}" ] || { echo "::error::SUPABASE_DB_PASSWORD is absent."; exit 1; }
          [ "$PROJECT_ID_SECRET" = "$EXPECTED_PROJECT_REF" ] || { echo "::error::Pinned project mismatch."; exit 1; }
          git fetch origin main --quiet
          [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ] || {
            echo "::error::Validated commit is no longer current main."; exit 1;
          }

      - name: Require existing function secrets without printing values
        run: |
          set -euo pipefail
          secrets="$(supabase secrets list --project-ref "$EXPECTED_PROJECT_REF")"
          for key in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY OSI_V2_ALLOWED_ORIGIN OSI_MAINTAINER_AUTH_UUID; do
            echo "$secrets" | grep -q "$key" || { echo "::error::$key is absent."; exit 1; }
          done
          if echo "$secrets" | grep -q 'SOLANA_RPC_URL'; then
            echo "SOLANA_RPC_URL: present"
          else
            echo "::warning::SOLANA_RPC_URL is absent; the gateway will use its rate-limited mainnet fallback."
          fi

      - name: Resolve pinned session-pooler coordinates
        run: |
          set -euo pipefail
          response="$(curl -sS --fail --max-time 30 -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" "https://api.supabase.com/v1/projects/${EXPECTED_PROJECT_REF}/config/database/pooler")"
          coordinates="$(printf '%s' "$response" | python3 -c '
          import sys, json
          data = json.load(sys.stdin)
          rows = data if isinstance(data, list) else [data]
          primary = next((r for r in rows if str(r.get("database_type", "")).upper() == "PRIMARY"), rows[0])
          print(primary["db_host"], primary["db_port"], primary["db_user"], primary.get("db_name", "postgres"))
          ')"
          read -r PGHOST PGPORT PGUSER PGDATABASE <<< "$coordinates"
          case "$PGHOST" in *.pooler.supabase.com) : ;; *) echo "::error::Unexpected pooler host."; exit 1 ;; esac
          [ "$PGUSER" = "postgres.${EXPECTED_PROJECT_REF}" ] || { echo "::error::Unexpected pooler user."; exit 1; }
          { echo "PGHOST=$PGHOST"; echo "PGPORT=$PGPORT"; echo "PGUSER=$PGUSER"; echo "PGDATABASE=$PGDATABASE"; } >> "$GITHUB_ENV"

      - name: Snapshot protected V1 counts and every pre-existing config value
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 -Atq -F'|' -f - > /tmp/v1-before.txt <<'SQL'
          begin read only;
          select table_name || '|' || row_count from (
            select 'reports' table_name, (select count(*) from public.reports) row_count
            union all select 'bounties', (select count(*) from public.bounties)
            union all select 'challenges', (select count(*) from public.challenges)
            union all select 'vouches', (select count(*) from public.vouches)
            union all select 'escalation_packs', (select count(*) from public.escalation_packs)
            union all select 'onchain_events', (select count(*) from public.onchain_events)
            union all select 'analysts', (select count(*) from public.analysts)
            union all select 'profiles', (select count(*) from public.profiles)
            union all select 'requests', (select count(*) from public.requests)
            union all select 'request_votes', (select count(*) from public.request_votes)
            union all select 'bounty_boosts', (select count(*) from public.bounty_boosts)
          ) counts order by table_name;
          commit;
          SQL
          psql -v ON_ERROR_STOP=1 -Atq -F'|' -f - > /tmp/config-before.txt <<'SQL'
          begin read only;
          select key || '|' || encode(convert_to(value, 'UTF8'), 'base64')
            from public.osi_config
           order by key;
          commit;
          SQL

      - name: Link and verify exact remote migration history
        run: |
          set -euo pipefail
          supabase link --project-ref "$EXPECTED_PROJECT_REF"
          [ "$(cat supabase/.temp/project-ref)" = "$EXPECTED_PROJECT_REF" ] || { echo "::error::Linked project mismatch."; exit 1; }
          got="$(psql -Atqc "select coalesce(string_agg(version, ' ' order by version), '') from supabase_migrations.schema_migrations")"
          base="$(echo "$BASE_VERSIONS" | tr -s '[:space:]' ' ' | sed 's/^ //; s/ $//')"
          phase1="$(echo "$PHASE1_VERSIONS" | tr -s '[:space:]' ' ' | sed 's/^ //; s/ $//')"
          after="$(echo "$AFTER_VERSIONS" | tr -s '[:space:]' ' ' | sed 's/^ //; s/ $//')"
          if [ "$got" = "$base" ]; then
            { echo "MODE=catchup"; echo "PENDING_VERSIONS=${PHASE1_VERSION} ${PHASE2_VERSION}"; } >> "$GITHUB_ENV"
          elif [ "$got" = "$phase1" ]; then
            { echo "MODE=deploy"; echo "PENDING_VERSIONS=${PHASE2_VERSION}"; } >> "$GITHUB_ENV"
          elif [ "$got" = "$after" ]; then
            { echo "MODE=resume"; echo "PENDING_VERSIONS="; } >> "$GITHUB_ENV"
          else
            echo "::error::Remote history is not the exact approved base, Phase 1, or Phase 2 state. Got versions: ${got:-<empty>}"
            exit 1
          fi

      - name: Record exact disable and forward-fix plan
        run: |
          echo "Only OSI_V2_WIRE_WRITES_ENABLED may change from false to true."
          echo "Disable plan: restore that one flag to false; retain immutable rows and ship a reviewed forward fix."
          echo "No drop, reset, repair, truncation, broad update, or data rewrite is an acceptable rollback."

      - name: Dry-run exact pending Wire migrations
        if: ${{ env.MODE != 'resume' }}
        run: |
          set -euo pipefail
          supabase db push --linked --dry-run 2>&1 | tee /tmp/wire-phase2-dry-run.txt
          got="$(grep -oE '20[0-9]{12}' /tmp/wire-phase2-dry-run.txt | awk '!seen[$0]++' | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
          [ "$got" = "$PENDING_VERSIONS" ] || { echo "::error::Dry-run is not exactly the expected pending Wire migration set."; exit 1; }

      - name: Apply exact pending additive Wire migrations
        if: ${{ env.MODE != 'resume' }}
        run: supabase db push --linked --yes

      - name: Verify history privacy privileges indexes and fail-closed flag
        run: |
          set -euo pipefail
          [ "$(psql -Atqc "select string_agg(version, ' ' order by version) from supabase_migrations.schema_migrations")" = "$(echo "$AFTER_VERSIONS" | tr -s '[:space:]' ' ' | sed 's/^ //; s/ $//')" ]
          psql -v ON_ERROR_STOP=1 -Atq <<'SQL'
          do $$
          begin
            if (select value from public.osi_config where key='OSI_V2_WIRE_WRITES_ENABLED') is distinct from 'false'
              then raise exception 'Wire flag did not land false'; end if;
            if (select value from public.osi_config where key='OSI_V2_WIRE_STANDARD_MIN_COUNT') is distinct from '2'
               or (select value from public.osi_config where key='OSI_V2_WIRE_STANDARD_MIN_WEIGHT') is distinct from '2.00'
              then raise exception 'Wire standard publication quorum defaults are not exact'; end if;
            if (select value from public.osi_config where key='OSI_V2_WRITES_ENABLED') is distinct from 'false'
               or (select value from public.osi_config where key='OSI_V2_PROOF_ENABLED') is distinct from 'false'
              then raise exception 'broad V2 flags are not closed'; end if;
            if exists (
              select 1 from (values ('wire_reports'),('wire_report_versions'),('wire_report_version_evidence'),('wire_report_reviews'),('challenges_v2'),('support_events'),('evidence_items'),('event_receipts'),('osi_nonces')) required(name)
              where not exists (
                select 1 from pg_class
                 where oid=('public.' || required.name)::regclass
                   and relrowsecurity and relforcerowsecurity
              )
            ) then raise exception 'Wire surface is missing forced RLS'; end if;
            if has_table_privilege('anon','public.wire_reports','SELECT')
               or has_table_privilege('authenticated','public.wire_report_versions','INSERT')
               or has_function_privilege('authenticated','public.osi_v2_commit_wire_version(text,text,text,text,text,text,jsonb,text,text,timestamptz)','EXECUTE')
               or has_function_privilege('anon','public.osi_v2_list_public_wire_reports(integer,timestamp with time zone)','EXECUTE')
              then raise exception 'browser can bypass the Wire gateway'; end if;
            if to_regclass('public.wire_reports_public_ref_uidx') is null
               or to_regclass('public.wire_report_versions_version_ref_uidx') is null
               or to_regclass('public.wire_report_version_evidence_ordinal_uidx') is null
              then raise exception 'required Wire lineage or evidence index is absent'; end if;
          end
          $$;
          SQL
          psql -v ON_ERROR_STOP=1 -Atq -F'|' -f - > /tmp/config-after-migration.txt <<'SQL'
          begin read only;
          select key || '|' || encode(convert_to(value, 'UTF8'), 'base64')
            from public.osi_config
           order by key;
          commit;
          SQL
          if [ -n "$(comm -23 /tmp/config-before.txt /tmp/config-after-migration.txt)" ]; then
            echo "::error::A pre-existing config key or value changed during migration."; exit 1;
          fi
          psql -v ON_ERROR_STOP=1 -Atq -F'|' -f - > /tmp/config-pre-enable.txt <<'SQL'
          begin read only;
          select key || '|' || encode(convert_to(value, 'UTF8'), 'base64')
            from public.osi_config
           where key <> 'OSI_V2_WIRE_WRITES_ENABLED'
           order by key;
          commit;
          SQL

      - name: Deploy exactly the three touched Edge Functions
        run: |
          set -euo pipefail
          for fn in osi-v2-case-read osi-v2-wire osi-v2-payment; do
            supabase functions deploy "$fn" --project-ref "$EXPECTED_PROJECT_REF" --no-verify-jwt --use-api
          done
          functions="$(supabase functions list --project-ref "$EXPECTED_PROJECT_REF")"
          echo "$functions" | grep -q 'osi-v2-case-read' || { echo "::error::Case read function unavailable."; exit 1; }
          echo "$functions" | grep -q 'osi-v2-wire' || { echo "::error::Wire function unavailable."; exit 1; }
          echo "$functions" | grep -q 'osi-v2-payment' || { echo "::error::Payment function unavailable."; exit 1; }

      - name: Verify production web exposes the governed Wire surfaces
        run: |
          set -euo pipefail
          curl -sS --fail --max-time 30 "$PRODUCTION_WEB_URL" > /tmp/production-index.html
          grep -q 'id="osi-wire-intake-action"' /tmp/production-index.html || { echo "::error::Production web does not expose the Wire intake action."; exit 1; }
          grep -q 'id="osi-wire-queue-action"' /tmp/production-index.html || { echo "::error::Production web does not expose the authorized Wire queue action."; exit 1; }
          grep -q 'id="osi-wire-drawer"' /tmp/production-index.html || { echo "::error::Production web does not expose the Wire detail drawer."; exit 1; }
          grep -q 'assets/js/v2-wire-integration.js' /tmp/production-index.html || { echo "::error::Production web does not load the native Wire integration."; exit 1; }
          if grep -q 'id="wire-form"' /tmp/production-index.html; then
            echo "::error::Retired legacy Wire submission form remains in production."; exit 1;
          fi

      - name: Pre-enable read-only privacy and regression smoke
        run: |
          set -euo pipefail
          base="https://${EXPECTED_PROJECT_REF}.supabase.co/functions/v1"
          origin_header="Origin: ${PRODUCTION_WEB_URL}"
          wallet='11111111111111111111111111111112'
          capability="$(curl -sS --fail --max-time 30 -X POST "$base/osi-v2-wire" -H "$origin_header" -H 'Content-Type: application/json' -d '{"op":"capabilities"}')"
          echo "$capability" | grep -q '"wire_writes_enabled":false' || { echo "::error::Wire flag was not closed before smoke."; exit 1; }
          curl -sS --fail --max-time 30 -o /tmp/public-wire.json -X POST "$base/osi-v2-wire" -H "$origin_header" -H 'Content-Type: application/json' -d '{"op":"list_public_wire_reports","limit":40}'
          grep -Eq '"reports"[[:space:]]*:[[:space:]]*\[[[:space:]]*\]' /tmp/public-wire.json || { echo "::error::Phase 2 public Wire list is not honestly empty before first publication."; exit 1; }
          code="$(curl -sS --max-time 30 -o /tmp/no-wire-session.json -w '%{http_code}' -X POST "$base/osi-v2-wire" -H "$origin_header" -H 'Content-Type: application/json' --data-binary "$(printf '{\"op\":\"list_my_wire_reports\",\"wallet\":\"%s\"}' "$wallet")")"
          [ "$code" != "200" ] || { echo "::error::Private Wire history was returned without a shared read session."; exit 1; }
          if grep -Eq '"(body_private|uncertainties_private|evidence_snapshot_hash|private_note|restricted_detail|signature|nonce|payload_hash|wire_report_id|wire_report_version_id)"[[:space:]]*:' /tmp/public-wire.json; then
            echo "::error::Public Wire list exposed restricted or internal material."; exit 1;
          fi
          curl -sS --fail --max-time 30 -X POST "$base/osi-v2-case-read" -H "$origin_header" -H 'Content-Type: application/json' -d '{"op":"list_public_cases"}' > /tmp/public-cases.json
          if grep -Eq '"(details_restricted|body_private|uncertainties_private|private_note|signature|nonce)"[[:space:]]*:' /tmp/public-cases.json; then
            echo "::error::Public Case response exposed a restricted field."; exit 1;
          fi
          session="$(curl -sS --fail --max-time 30 -X POST "$base/osi-v2-case-read" -H "$origin_header" -H 'Content-Type: application/json' --data-binary "$(printf '{\"op\":\"issue_read_session_challenge\",\"wallet\":\"%s\"}' "$wallet")")"
          echo "$session" | grep -q '"challenge"' || { echo "::error::Shared read-session challenge regressed."; exit 1; }
          verify="$(curl -sS --fail --max-time 30 -X POST "$base/osi-v2-proof" -H "$origin_header" -H 'Content-Type: application/json' --data-binary "$(printf '{\"mode\":\"sas_verify\",\"wallet\":\"%s\"}' "$wallet")")"
          echo "$verify" | grep -q '"program_id"' || { echo "::error::sas_verify regressed."; exit 1; }
          echo "$verify" | grep -q '"valid":false' || { echo "::error::sas_verify claimed validity for an uncredentialed wallet."; exit 1; }

      - name: Enable only the dedicated Wire write flag
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 -Atq <<'SQL'
          do $$
          begin
            if (select value from public.osi_config where key='OSI_V2_WIRE_WRITES_ENABLED') is distinct from 'false'
              then raise exception 'Wire flag was not false immediately before enable'; end if;
            if (select value from public.osi_config where key='OSI_V2_WRITES_ENABLED') is distinct from 'false'
               or (select value from public.osi_config where key='OSI_V2_PROOF_ENABLED') is distinct from 'false'
              then raise exception 'broad gates are not closed'; end if;
            update public.osi_config
               set value='true', updated_at=statement_timestamp()
             where key='OSI_V2_WIRE_WRITES_ENABLED' and value='false';
            if not found then raise exception 'Wire flag enable did not affect one exact row'; end if;
          end
          $$;
          SQL

      - name: Post-enable isolation capability and negative authorization smoke
        run: |
          set -euo pipefail
          base="https://${EXPECTED_PROJECT_REF}.supabase.co/functions/v1"
          origin_header="Origin: ${PRODUCTION_WEB_URL}"
          capability="$(curl -sS --fail --max-time 30 -X POST "$base/osi-v2-wire" -H "$origin_header" -H 'Content-Type: application/json' -d '{"op":"capabilities"}')"
          echo "$capability" | grep -q '"wire_writes_enabled":true' || { echo "::error::Wire capability did not observe the enabled flag."; exit 1; }
          code="$(curl -sS --max-time 30 -o /tmp/bad-wire-wallet.json -w '%{http_code}' -X POST "$base/osi-v2-wire" -H "$origin_header" -H 'Content-Type: application/json' -d '{"op":"prepare_wire","wallet":"bad","wire":{},"idempotency_key":"wire-production-negative-0001"}')"
          [ "$code" = "400" ] || { echo "::error::Invalid Wire wallet was not rejected before nonce issuance."; exit 1; }
          curl -sS --fail --max-time 30 -o /tmp/public-wire-after.json -X POST "$base/osi-v2-wire" -H "$origin_header" -H 'Content-Type: application/json' -d '{"op":"list_public_wire_reports","limit":40}'
          grep -Eq '"reports"[[:space:]]*:[[:space:]]*\[[[:space:]]*\]' /tmp/public-wire-after.json || { echo "::error::Enabling writes invented a public Wire record."; exit 1; }
          [ "$(psql -Atqc "select value from public.osi_config where key='OSI_V2_WIRE_WRITES_ENABLED'")" = "true" ]
          [ "$(psql -Atqc "select value from public.osi_config where key='OSI_V2_WRITES_ENABLED'")" = "false" ]
          [ "$(psql -Atqc "select value from public.osi_config where key='OSI_V2_PROOF_ENABLED'")" = "false" ]
          psql -v ON_ERROR_STOP=1 -Atq -F'|' -f - > /tmp/config-after-enable.txt <<'SQL'
          begin read only;
          select key || '|' || encode(convert_to(value, 'UTF8'), 'base64')
            from public.osi_config
           where key <> 'OSI_V2_WIRE_WRITES_ENABLED'
           order by key;
          commit;
          SQL
          diff -u /tmp/config-pre-enable.txt /tmp/config-after-enable.txt

      - name: Prove protected V1 row counts are unchanged
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 -Atq -F'|' -f - > /tmp/v1-after.txt <<'SQL'
          begin read only;
          select table_name || '|' || row_count from (
            select 'reports' table_name, (select count(*) from public.reports) row_count
            union all select 'bounties', (select count(*) from public.bounties)
            union all select 'challenges', (select count(*) from public.challenges)
            union all select 'vouches', (select count(*) from public.vouches)
            union all select 'escalation_packs', (select count(*) from public.escalation_packs)
            union all select 'onchain_events', (select count(*) from public.onchain_events)
            union all select 'analysts', (select count(*) from public.analysts)
            union all select 'profiles', (select count(*) from public.profiles)
            union all select 'requests', (select count(*) from public.requests)
            union all select 'request_votes', (select count(*) from public.request_votes)
            union all select 'bounty_boosts', (select count(*) from public.bounty_boosts)
          ) counts order by table_name;
          commit;
          SQL
          diff -u /tmp/v1-before.txt /tmp/v1-after.txt

      - name: Fail closed after any rollout or smoke failure
        if: ${{ failure() }}
        run: |
          set -euo pipefail
          if [ -z "${PGHOST:-}" ] || [ -z "${PGUSER:-}" ]; then
            echo "No production database session was established; this job did not enable Wire writes."
            exit 0
          fi
          wire_flag="$(psql -v ON_ERROR_STOP=1 -Atqc "select value from public.osi_config where key='OSI_V2_WIRE_WRITES_ENABLED'")"
          if [ -z "$wire_flag" ]; then
            echo "Wire write flag is absent; writes remain fail closed."
            exit 0
          fi
          if [ "$wire_flag" = "false" ]; then
            echo "Wire writes were already disabled."
            exit 0
          fi
          psql -v ON_ERROR_STOP=1 -Atq -c "
            update public.osi_config
               set value='false', updated_at=statement_timestamp()
             where key='OSI_V2_WIRE_WRITES_ENABLED';"
          [ "$(psql -Atqc "select value from public.osi_config where key='OSI_V2_WIRE_WRITES_ENABLED'")" = "false" ] || {
            echo "::error::Wire writes could not be confirmed disabled."; exit 1;
          }
          echo "Wire writes were disabled. Immutable rows remain retained for a reviewed forward fix."

      - name: Write deployment receipt artifact
        run: |
          mkdir -p deployment-receipt
          {
            echo "project_ref=${EXPECTED_PROJECT_REF}"
            echo "migrations=${PHASE1_VERSION},${PHASE2_VERSION}"
            echo "rollout_mode=${MODE}"
            echo "functions=osi-v2-case-read,osi-v2-wire,osi-v2-payment"
            echo "commit=$(git rev-parse HEAD)"
            echo "wire_writes=true"
            echo "broad_v2_writes=false"
            echo "broad_v2_proof=false"
            echo "public_wire_projection=enabled_and_empty_until_governed_publication"
            echo "rollback=disable_wire_flag_and_forward_fix"
          } > deployment-receipt/osi-v2-wire-phase2-production.txt

      - name: Upload deployment receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: osi-v2-wire-phase2-production-${{ github.sha }}
          path: deployment-receipt/osi-v2-wire-phase2-production.txt
          retention-days: 30
